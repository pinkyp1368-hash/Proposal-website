<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #ff6a88);
      overflow: hidden;
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      color: rgba(255,255,255,0.7);
      font-size: 20px;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      text-align: center;
      z-index: 1;
    }

    h1 {
      font-size: 32px;
      color: #ff4d6d;
    }

    p {
      font-size: 18px;
      color: #444;
    }

    button {
      margin: 10px;
      padding: 12px 22px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    #yes {
      background: #ff4d6d;
      color: white;
    }

    #yes:hover {
      transform: scale(1.1);
    }

    #no {
      background: #ddd;
    }

    #result {
      margin-top: 20px;
      color: #ff4d6d;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Hey 😊</h1>
    <p>I really like you... 💖</p>
    <p>Will you be mine?</p>
    <button id="yes" onclick="yesClick()">Yes 💖</button>
    <button id="no" onmouseover="moveNo()">No 😢</button>
    <h2 id="result"></h2>
  </div>

  <script>
    function yesClick() {
      document.getElementById("result").innerText = "Yayyy! You made me the happiest ❤️";
    }

    function moveNo() {
      const btn = document.getElementById("no");
      const x = Math.random() * window.innerWidth;
      const y = Math.random() * window.innerHeight;
      btn.style.position = "absolute";
      btn.style.left = x + "px";
      btn.style.top = y + "px";
    }

    // create floating hearts
    setInterval(() => {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerText = "💖";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = Math.random() * 20 + 15 + "px";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 6000);
    }, 300);
  </script>

</body>
</html>
