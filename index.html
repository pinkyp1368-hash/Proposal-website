!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      color: #333;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 28px;
    }

    p {
      font-size: 18px;
    }

    button {
      margin: 10px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    #yes {
      background: #ff4d6d;
      color: white;
    }

    #no {
      background: #ccc;
    }

    #no:hover {
      position: absolute;
      left: Math.random()*80 + '%';
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hey 😊</h1>
    <p>I really like you... 💖</p>
    <p>Will you be mine?</p>
    <button id="yes" onclick="yesClick()">Yes ❤️</button>
    <button id="no" onmouseover="moveNo()">No 😢</button>
    <h2 id="result"></h2>
  </div>

  <script>
    function yesClick() {
      document.getElementById("result").innerText = "Yayyy! 💖";
    }

    function moveNo() {
      const btn = document.getElementById("no");
      const x = Math.random() * window.innerWidth;
      const y = Math.random() * window.innerHeight;
      btn.style.position = "absolute";
      btn.style.left = x + "px";
      btn.style.top = y + "px";
    }
  </script>
</body>
</html>
